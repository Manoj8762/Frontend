    <h1>📚 eBook Store</h1>
    <div class="book-container" id="bookContainer"></div>

        <h2>🛒 Cart</h2>
        <div class="cart" id="cartContainer"></div>
        <button onclick="checkout()">Checkout</button>
    </div>
    <script>
        let books = [];
        let cart = [];
        let history = [];
        
        function generateBooks() {
            const bookContainer = document.getElementById("bookContainer");
            bookContainer.innerHTML = "";
            books = [];
            for (let i = 0; i < 10; i++) {
                let book = {

                let bookCard = document.createElement("div");
                bookCard.classList.add("book-card");
                bookCard.innerHTML = `
                    <h2>${book.title}</h2>
                    <p class="price">$${book.price}</p>
                    <button onclick='addToCart(${i})'>Add to Cart</button>
                `;
                bookContainer.appendChild(bookCard);
            }
        }
        
        function addToCart(index) {
            cart.push(books[index]);
            updateCart();
        }
        
        function updateCart() {
            const cartContainer = document.getElementById("cartContainer");
            cartContainer.innerHTML = "";
            cart.forEach((book, index) => {
                let cartItem = document.createElement("div");
                cartItem.classList.add("cart-item");
                cartItem.innerHTML = `
                    <h2>${book.title}</h2>
                    <p class="price">$${book.price}</p>
                    <button onclick='removeFromCart(${index})'>Remove</button>
                `;
                cartContainer.appendChild(cartItem);
            });
        }
        
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }
        
        function checkout() {
            history.push(...cart);
            cart = [];
            updateCart();
            alert("Purchase successful! Check history.");
            console.log("Purchase History:", history);
        }
        
        generateBooks();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBook Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        .controls {
            margin-bottom: 20px;
        }
        select, input {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .book-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .book-card {
            width: 250px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        .book-card:hover {
            transform: scale(1.05);
        }
        .book-cover {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }
        h2 {
            font-size: 18px;
            margin: 10px 0;
        }
        .author {
            color: #777;
            font-size: 14px;
        }
        .price {
            font-size: 16px;
            font-weight: bold;
            color: #27ae60;
            margin: 10px 0;
        }
        .availability {
            font-size: 14px;
            font-weight: bold;
            padding: 5px;
            border-radius: 5px;
        }
        .available {
            background-color: #2ecc71;
            color: white;
        }
        .not-available {
            background-color: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>
    <h1>📚 eBook Store</h1>
    <div class="controls">
        <input type="text" id="searchBox" placeholder="Search for a book..." onkeyup="searchBook()">
        <select id="categoryFilter" onchange="filterBooks()">
            <option value="all">All Categories</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Electronics And Comminication">Electronics And Comminication</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Electrical And Electronics">Electrical And Electronics</option>
            <option value="Civil">Civil</option>
        </select>
    </div>
    <div class="book-container" id="bookContainer"></div>



    <script>
        const categories = ["Computer Science", "Electronics And Communication", "Mechanical", "Electrical And Electronics", "Civil"];
        
        const authors = [
            { name: 'Dimitri Bertsekas', domain: 'Computer Science' },
            { name: 'William Stallings', domain: 'Computer Science' },
            { name: 'J. David Irwin', domain: 'Electrical Engineering' },
            { name: 'Sudhir Shelke', domain: 'Electronics And Communication' },
            { name: 'Pramod B. Patil', domain: 'Electronics And Communication' },
            { name: 'B. Somanathan Nair', domain: 'Electronics And Communication' },
            { name: 'S.R. Deepa', domain: 'Electronics And Communication' },
            { name: 'Rohit Khurana', domain: 'Electronics And Communication' },
            { name: 'Sandeep Joshi', domain: 'Electronics And Communication' },
            { name: 'R. Agor', domain: 'Civil' },
            { name: 'B.C. Punmia', domain: 'Civil' },
            { name: 'A.K. Jain', domain: 'Civil' },
            { name: 'S.S. Rattan', domain: 'Civil' },
            { name: 'P.N. Modi', domain: 'Civil' }
        ];
    
        let books = [];
    
        function generateBooks() {
            const bookContainer = document.getElementById("bookContainer");
            bookContainer.innerHTML = "";
            books = [];
    
            for (let i = 0; i < 100; i++) {
                let title = `Book Title ${i + 1}`;
                let author = authors[i % authors.length].name;
                let category = categories[i % categories.length];
                let price = (Math.random() * (30 - 5) + 5).toFixed(2);
                let available = i % 2 === 0; // Alternate availability
                let bookCover = `https://source.unsplash.com/200x300/?book,novel&sig=${i}`;
    
                let bookData = { title, author, category, price: parseFloat(price), available, bookCover };
                books.push(bookData);
    
                let bookCard = createBookCard(bookData);
                bookContainer.appendChild(bookCard);
            }
        }
    
        function createBookCard(book) {
            let bookCard = document.createElement("div");
            bookCard.classList.add("book-card");
            bookCard.setAttribute("data-title", book.title.toLowerCase());
            bookCard.setAttribute("data-category", book.category.trim());
    
            bookCard.innerHTML = `
                <img class="book-cover" src="${book.bookCover}" alt="Book Cover">
                <h2>${book.title}</h2>
                <p class="author">By ${book.author}</p>
                <p class="price">$${book.price}</p>
                <p class="availability ${book.available ? 'available' : 'not-available'}">
                    ${book.available ? '🟢 In Stock' : '🔴 Out of Stock'}
                </p>
            `;
    
            return bookCard;
        }
    
        function searchBook() {
            let input = document.getElementById("searchBox").value.toLowerCase();
            let books = document.querySelectorAll(".book-card");
    
            books.forEach(book => {
                let title = book.getAttribute("data-title");
                book.style.display = title.includes(input) ? "block" : "none";
            });
        }
    
        function filterBooks() {
            let category = document.getElementById("categoryFilter").value.trim();
            let books = document.querySelectorAll(".book-card");
    
            books.forEach(book => {
                let bookCategory = book.getAttribute("data-category").trim();
                book.style.display = (category === "all" || bookCategory === category) ? "block" : "none";
            });
        }
    
        generateBooks();
    </script>
